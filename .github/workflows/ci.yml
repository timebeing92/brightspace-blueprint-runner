name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: runner
      - uses: actions/checkout@v6
        with:
          repository: timebeing92/brightspace-blueprint-bundle
          path: bundle
          ref: 0b197d95b8b1a5593f92772e664b1d04c5441677
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: runner/requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
        working-directory: runner
      - run: python -m pytest -q
        working-directory: runner
      - name: Build explicit-ref release ZIP
        run: |
          bundle_sha=$(git -C ../bundle rev-parse HEAD)
          python scripts/make_release_bundle.py \
            --runner-ref "$GITHUB_SHA" \
            --bundle-ref "$bundle_sha" \
            --bundle-dir ../bundle
          cd dist
          sha256sum -c *.sha256
        working-directory: runner
      - name: Build unreleased managed review kit
        run: |
          bundle_sha=$(git -C ../bundle rev-parse HEAD)
          python scripts/make_managed_review_kit.py \
            --runner-ref "$GITHUB_SHA" \
            --bundle-ref "$bundle_sha" \
            --bundle-dir ../bundle
          cd dist/review
          sha256sum -c *.sha256
        working-directory: runner

  managed-launcher-platforms:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: runner
      - uses: actions/checkout@v6
        with:
          repository: timebeing92/brightspace-blueprint-bundle
          path: bundle
          ref: 0b197d95b8b1a5593f92772e664b1d04c5441677
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: runner/requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
        working-directory: runner
      - name: Test managed install and lifecycle core
        run: >-
          python -m pytest -q
          tests/test_stable_launcher.py
          tests/test_release_install.py
          tests/test_network_update.py
          tests/test_blueprint_wizard.py
          tests/test_managed_package.py
        working-directory: runner
      - name: Parse the Windows stable launcher
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "launcher/blueprint_wizard_launcher.ps1"),
            [ref]$null,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count) {
            $errors | Out-String | Write-Error
            exit 1
          }
        working-directory: runner
      - name: Build and run managed package on POSIX
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bundle_sha=$(git -C ../bundle rev-parse HEAD)
          python scripts/make_managed_install_bundle.py \
            --runner-ref "$GITHUB_SHA" \
            --bundle-ref "$bundle_sha" \
            --bundle-dir ../bundle
          mkdir managed-proof
          python -c "from pathlib import Path; import zipfile; archives=list(Path('dist').glob('blueprint-wizard-managed-v*.zip')); assert len(archives) == 1; zipfile.ZipFile(archives[0]).extractall('managed-proof')"
          managed_root=$(python -c "from pathlib import Path; roots=list(Path('managed-proof').glob('blueprint-wizard-managed-v*')); assert len(roots) == 1; print(roots[0])")
          bash "$managed_root/blueprint_wizard_launcher.sh" --health
          bash "$managed_root/blueprint_wizard_launcher.sh" --version
        working-directory: runner
      - name: Build and run managed package on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundleSha = git -C ../bundle rev-parse HEAD
          python scripts/make_managed_install_bundle.py `
            --runner-ref $env:GITHUB_SHA `
            --bundle-ref $bundleSha `
            --bundle-dir ../bundle
          $archive = @(Get-ChildItem dist/blueprint-wizard-managed-v*.zip)
          if ($archive.Count -ne 1) { throw "Expected exactly one managed package" }
          Expand-Archive -Path $archive[0].FullName -DestinationPath managed-proof
          $managedRoot = @(Get-ChildItem managed-proof -Directory -Filter "blueprint-wizard-managed-v*")
          if ($managedRoot.Count -ne 1) { throw "Expected exactly one managed package root" }
          $launcher = Join-Path $managedRoot[0].FullName "blueprint_wizard_launcher.ps1"
          & $launcher --health
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $launcher --version
          exit $LASTEXITCODE
        working-directory: runner
