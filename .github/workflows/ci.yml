name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: runner
      - uses: actions/checkout@v6
        with:
          repository: timebeing92/brightspace-blueprint-bundle
          path: bundle
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: runner/requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
        working-directory: runner
      - run: python -m pytest -q
        working-directory: runner
      - name: Build explicit-ref release ZIP
        run: |
          bundle_sha=$(git -C ../bundle rev-parse HEAD)
          python scripts/make_release_bundle.py \
            --runner-ref "$GITHUB_SHA" \
            --bundle-ref "$bundle_sha" \
            --bundle-dir ../bundle
          cd dist
          sha256sum -c *.sha256
        working-directory: runner
      - name: Build unreleased managed review kit
        run: |
          bundle_sha=$(git -C ../bundle rev-parse HEAD)
          python scripts/make_managed_review_kit.py \
            --runner-ref "$GITHUB_SHA" \
            --bundle-ref "$bundle_sha" \
            --bundle-dir ../bundle
          cd dist/review
          sha256sum -c *.sha256
        working-directory: runner

  managed-launcher-platforms:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: runner
      - uses: actions/checkout@v6
        with:
          repository: timebeing92/brightspace-blueprint-bundle
          path: bundle
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: runner/requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
        working-directory: runner
      - name: Test managed install and lifecycle core
        run: >-
          python -m pytest -q
          tests/test_stable_launcher.py
          tests/test_release_install.py
          tests/test_network_update.py
          tests/test_blueprint_wizard.py
          tests/test_managed_package.py
        working-directory: runner
      - name: Parse the Windows stable launcher
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "launcher/blueprint_wizard_launcher.ps1"),
            [ref]$null,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count) {
            $errors | Out-String | Write-Error
            exit 1
          }
        working-directory: runner
      - name: Build and run managed candidate on POSIX
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bundle_sha=$(git -C ../bundle rev-parse HEAD)
          python scripts/make_managed_install_bundle.py \
            --runner-ref "$GITHUB_SHA" \
            --bundle-ref "$bundle_sha" \
            --bundle-dir ../bundle
          mkdir managed-proof
          python -c "import zipfile; zipfile.ZipFile('dist/blueprint-wizard-managed-v2.7.0.zip').extractall('managed-proof')"
          bash managed-proof/blueprint-wizard-managed-v2.7.0/blueprint_wizard_launcher.sh --health
          bash managed-proof/blueprint-wizard-managed-v2.7.0/blueprint_wizard_launcher.sh --version
        working-directory: runner
      - name: Build and run managed candidate on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundleSha = git -C ../bundle rev-parse HEAD
          python scripts/make_managed_install_bundle.py `
            --runner-ref $env:GITHUB_SHA `
            --bundle-ref $bundleSha `
            --bundle-dir ../bundle
          Expand-Archive `
            -Path dist/blueprint-wizard-managed-v2.7.0.zip `
            -DestinationPath managed-proof
          $launcher = "managed-proof/blueprint-wizard-managed-v2.7.0/blueprint_wizard_launcher.ps1"
          & $launcher --health
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $launcher --version
          exit $LASTEXITCODE
        working-directory: runner
